<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Rearranger</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 2rem;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }

    textarea {
      width: 100%;
      height: 120px;
      border: none;
      border-radius: 0.5rem;
      padding: 1rem;
      resize: none;
      background: rgba(255, 255, 255, 0.15);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    button {
      margin-top: 1rem;
      width: 100%;
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    button:hover {
      background: #0ea5e9;
    }

    .output {
      margin-top: 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      padding: 1rem;
      min-height: 50px;
      white-space: pre-wrap;
      font-size: 1rem;
      overflow-y: hidden; /* 🔥 Hides scrollbar */
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔢 Number Rearranger</h1>
    <textarea id="numberInput" placeholder="Enter numbers (each on new line)"></textarea>
    <button id="sortBtn">Sort Numbers</button>
    <div class="output" id="outputArea">Sorted output will appear here...</div>
    <footer>Made with ❤️ by Md Akash</footer>
  </div>

  <script>
    const input = document.getElementById("numberInput");
    const output = document.getElementById("outputArea");
    const sortBtn = document.getElementById("sortBtn");

    sortBtn.addEventListener("click", () => {
      let lines = input.value
        .split("\n")
        .map(v => v.trim())
        .filter(v => v !== "");

      if (lines.length === 0) {
        output.textContent = "Please enter some numbers!";
        return;
      }

      // 🧠 Smart "version-style" sorting
      lines.sort((a, b) => {
        const partsA = a.split(".").map(Number);
        const partsB = b.split(".").map(Number);

        for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
          const diff = (partsA[i] || 0) - (partsB[i] || 0);
          if (diff !== 0) return diff;
        }
        return 0;
      });

      output.textContent = lines.join("\n");
    });
  </script>
</body>
</html>
